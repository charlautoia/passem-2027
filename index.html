      {start:267, end:297, col:"#993556", name:"Section 4 · Rabastens → Lisle-sur-Tarn"}
    ];

    const map = L.map('map').setView([43.74, 2.05], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18
    }).addTo(map);

    traces.forEach(t => L.polyline(t.c, {color: t.col, weight: 4, opacity: 0.85}).addTo(map));

    const keyKms = new Set([0, 60, 61, 199, 200, 266, 267, 297]);

    kmPts.forEach((p, i) => {
      const sec  = secColors.find(s => p.km >= s.start && p.km <= s.end) || secColors[0];
      const info = popup[i] || {};
      const isKey = keyKms.has(p.km);

      const popHtml = `
        <div class="popup-km" style="color:${sec.col}">km ${p.km}</div>
        <div style="font-size:11px;color:#999;margin-bottom:6px">${sec.name}</div>
        <div class="popup-row">
          <span class="popup-label">🏘️ Commune&nbsp;</span><b>${info.commune || '—'}</b><br>
          <span class="popup-label">⏰ Horaire&nbsp;</span><b>${info.horaire || '—'}</b><br>
          <span class="popup-label">🚶 Vitesse&nbsp;</span><b>${info.kmh || 9} km/h</b>
        </div>`;

      L.circleMarker([p.lat, p.lon], {
        radius: isKey ? 9 : 5,
        fillColor: sec.col,
        color: '#fff',
        weight: isKey ? 2.5 : 1.5,
        fillOpacity: 1
      }).addTo(map).bindPopup(popHtml, {maxWidth: 220});
    });
  </script>
</body>
</html>
