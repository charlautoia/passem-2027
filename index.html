      });
    }

    const MODIFIED_COLOR = '#e06030';
    const markerStore = {};

    mergedKmPts.forEach(function(p, i) {
      const sec = secColors.find(function(s) { return p.km >= s.start && p.km <= s.end; }) || secColors[0];
      const info = popup[i] || {};
      const isKey = keyKms.has(p.km);
      const base = kmPts[i];

      function makePopup(lat, lon, modified) {
        return '<div class="popup-km" style="color:' + sec.col + '">km ' + p.km
          + (modified ? ' <span style="font-size:12px">✏️</span>' : '') + '</div>'
          + '<div class="popup-sec">' + sec.name + '</div>'
          + '<div class="popup-row">'
          + '<span class="popup-label">🏘️ Commune&nbsp;&nbsp;</span><b>' + (info.commune || '—') + '</b><br>'
          + '<span class="popup-label">⏰ Horaire&nbsp;&nbsp;&nbsp;</span><b>' + (info.horaire || '—') + '</b><br>'
          + '<span class="popup-label">🚶 Vitesse&nbsp;&nbsp;&nbsp;</span><b>' + (info.kmh || 9) + ' km/h</b>'
          + '</div>'
          + '<div class="popup-gps">📍 ' + lat.toFixed(5) + ', ' + lon.toFixed(5) + '</div>'
          + (modified
            ? '<div style="margin-top:6px"><button onclick="resetKm(' + p.km + ')"'
              + ' style="font-size:11px;padding:2px 8px;cursor:pointer;border:1px solid #ccc;'
              + 'border-radius:3px;background:#fff;">↩ Réinitialiser</button></div>'
            : '');
      }

      const isModified = !!overrides[String(p.km)];
      const marker = L.marker([p.lat, p.lon], {
        icon: makeIcon(isModified ? MODIFIED_COLOR : sec.col, isKey),
        draggable: true,
        title: 'km ' + p.km
      }).addTo(map).bindPopup(makePopup(p.lat, p.lon, isModified), {maxWidth: 220});

      markerStore[p.km] = {
        marker: marker, secCol: sec.col, isKey: isKey,
        makePopup: makePopup, baseLat: base.lat, baseLon: base.lon
      };

      marker.on('dragend', function(e) {
        const pos = e.target.getLatLng();
        const lat = +pos.lat.toFixed(6);
        const lon = +pos.lng.toFixed(6);
        overrides[String(p.km)] = {lat: lat, lon: lon};
        saveToStorage();
        marker.setIcon(makeIcon(MODIFIED_COLOR, isKey));
        marker.setPopupContent(makePopup(lat, lon, true));
      });
    });

    window.resetKm = function(km) {
      delete overrides[String(km)];
      saveToStorage();
      const md = markerStore[km];
      if (md) {
        md.marker.setLatLng([md.baseLat, md.baseLon]);
        md.marker.setIcon(makeIcon(md.secCol, md.isKey));
        md.marker.setPopupContent(md.makePopup(md.baseLat, md.baseLon, false));
        md.marker.closePopup();
      }
    };

    updateModBar();
      </script>
</body>
</html>
